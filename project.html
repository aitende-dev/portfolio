<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project Name - Portfolio</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="site-wrapper">
    <aside class="sidebar">
      <div class="logo">
        <a href="index.html">
          undertak<br>architecture
        </a>
      </div>
      <nav class="main-nav">
        <ul>
          <li><a href="index.html">work</a></li>
          <li><a href="vision.html">vision</a></li>
          <li><a href="#">about</a></li>
          <li><a href="#">contact</a></li>
        </ul>
      </nav>
    </aside>

    <main class="content" id="project-content">
      <!-- Project details will be loaded dynamically here -->
      <div style="text-align: center; padding: 50px;">
        <p>Loading project...</p>
      </div>
    </main>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", async () => {
      const urlParams = new URLSearchParams(window.location.search);
      const projectId = urlParams.get('id');
      const contentDiv = document.getElementById('project-content');

      if (!projectId) {
        contentDiv.innerHTML = '<div style="padding: 50px; text-align: center;"><h1>Project Not Found</h1><p>No project ID was provided.</p></div>';
        return;
      }

      try {
        const response = await fetch('projects.json');
        if (!response.ok) throw new Error('Failed to load projects');
        const data = await response.json();
        
        const project = data.find(p => p.id === projectId);
        
        if (!project) {
          contentDiv.innerHTML = '<div style="padding: 50px; text-align: center;"><h1>Project Not Found</h1><p>The requested project does not exist.</p></div>';
          return;
        }

        // Update page title
        document.title = `${project.shortTitle || project.title} - Portfolio`;

        // Build extra images HTML
        let extraImagesHtml = '';
        if (project.extraImages && project.extraImages.length > 0) {
          const imgTags = project.extraImages.map(src => `<img src="${src}" alt="Additional Image">`).join('');
          extraImagesHtml = `<div style="margin-top: 40px; display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
              ${imgTags}
          </div>`;
        }

        // Build description paragraphs HTML
        let descriptionHtml = '';
        if (project.description && project.description.length > 0) {
          descriptionHtml = project.description.map(p => `<p>${p}</p>`).join('');
        }

        // Build HTML
        const html = `
          <div class="project-header">
            <h1 class="project-title">${project.title}</h1>
          </div>
          <div class="project-layout">
            <div class="project-hero">
              <img src="${project.heroImage}" alt="Main Project Illustration">
              ${extraImagesHtml}
            </div>
            <div class="project-info">
              <h2>${project.shortTitle || project.title}</h2>
              ${descriptionHtml}
              <div class="project-meta">
                ${project.materials ? \`<p><strong>Materials:</strong> \${project.materials}</p>\` : ''}
                ${project.phase ? \`<p><strong>Phase:</strong> \${project.phase}</p>\` : ''}
                ${project.collaborator ? \`<p><strong>Collaborator:</strong> \${project.collaborator}</p>\` : ''}
              </div>
            </div>
          </div>
        `;

        contentDiv.innerHTML = html;

      } catch (error) {
        console.error(error);
        contentDiv.innerHTML = '<div style="padding: 50px; text-align: center;"><h1>Error</h1><p>There was an error loading the project details.</p></div>';
      }
    });
  </script>

</body>
</html>
