<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Architecture Portfolio</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="site-wrapper">
    <aside class="sidebar">
      <div class="logo">
        <a href="index.html">
          Anneke Iten de León<br>architecture
        </a>
      </div>
      <nav class="main-nav">
        <ul>
          <li><a href="index.html">work</a></li>
          <li><a href="about.html">about</a></li>
          <li><a href="#">contact</a></li>
        </ul>
      </nav>
    </aside>

    <main class="content">

      <div class="filter-menu" id="filter-menu">
        <a href="#" data-filter="all" class="active">all projects</a>
        <a href="#" data-filter="university">university</a>
        <a href="#" data-filter="work">work</a>
        <a href="#" data-filter="personal">personal</a>
      </div>

      <div class="project-grid" id="project-grid">
        <!-- Projects will be loaded dynamically here -->
      </div>
    </main>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", async () => {
      const projectGrid = document.getElementById('project-grid');
      const filterLinks = document.querySelectorAll('.filter-menu a');
      let projects = []; // Will hold the DOM elements after they are created

      // Fetch projects data
      try {
        const response = await fetch('projects.json');
        if (!response.ok) throw new Error('Failed to load projects');
        const data = await response.json();

        // Render projects
        data.forEach(project => {
          const card = document.createElement('a');
          card.href = `project.html?id=${project.id}`;
          card.className = 'project-card';
          card.setAttribute('data-category', project.category);

          const img = document.createElement('img');
          img.src = project.thumbnail;
          img.alt = project.shortTitle || project.title;
          if (project.thumbnailPosition) {
            img.style.objectPosition = project.thumbnailPosition;
          }

          const overlay = document.createElement('div');
          overlay.className = 'overlay';

          const title = document.createElement('p');
          title.className = 'project-name';
          title.textContent = project.shortTitle || project.title;

          overlay.appendChild(title);

          card.appendChild(img);
          card.appendChild(overlay);
          projectGrid.appendChild(card);
        });

        // Re-query the projects now that they are in the DOM
        projects = document.querySelectorAll('.project-card');
      } catch (error) {
        console.error(error);
        projectGrid.innerHTML = '<p style="text-align: center; grid-column: 1 / -1;">Error loading projects.</p>';
      }

      filterLinks.forEach(link => {
        link.addEventListener('click', (e) => {
          e.preventDefault(); // Prevents the page from jumping to the top

          // 1. Remove 'active' class from all links, add to the clicked one
          filterLinks.forEach(l => l.classList.remove('active'));
          link.classList.add('active');

          // 2. Get the category we want to filter by
          const filterValue = link.getAttribute('data-filter');

          // 3. Loop through all projects and hide/show them
          projects.forEach(project => {
            const projectCategory = project.getAttribute('data-category');

            if (filterValue === 'all' || projectCategory === filterValue) {
              project.classList.remove('hidden'); // Show it
            } else {
              project.classList.add('hidden'); // Hide it
            }
          });
        });
      });
    });
  </script>

</body>

</html>
