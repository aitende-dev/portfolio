<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anneke Iten de Leon | Selected Works</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="main-nav">
        <div class="logo">Anneke Iten de Leon</div>
        </div>
        <div class="nav-links">
            <a href="index.html" class="active">Selected Works</a>
            <a href="resume.html">Resume</a>
            <a href="contact.html">Contact</a>
        </div>
    </nav>

    <main id="page-projects" class="content-page">
        <div class="categories">
            <span class="filter-btn active" onclick="filterGallery('all', this)">ALL</span>
            <span class="filter-btn" onclick="filterGallery('studio', this)">STUDIO</span>
            <span class="filter-btn" onclick="filterGallery('internship', this)">INTERNSHIP</span>
            <span class="filter-btn" onclick="filterGallery('personal', this)">PERSONAL</span>
            <span class="filter-btn" onclick="filterGallery('other', this)">OTHER</span>
            <span class="shuffle-btn" onclick="reshuffle()" title="Randomize Gallery">⟳ SHUFFLE</span>          </div>

        <div class="gallery-masonry" id="gallery-grid">
            </div>
    </main>

    <div id="detail-view" class="detail-overlay hidden">
        <div class="detail-content-wrapper">
            
            <aside class="detail-sidebar">
                <span class="back-link" onclick="closeProject()">← Back to Projects</span>
                <h2 id="det-title"></h2>
                
                <div class="project-meta">
                    <p><strong>Location:</strong> <span id="det-loc"></span></p>
                    <p><strong>Year:</strong> <span id="det-year"></span></p>
                    <p><strong>Role:</strong> <span id="det-role"></span></p>
                </div>
                
                <div id="det-desc" class="det-description">
                    </div>
            </aside>

            <section class="slider-container">
                <div id="slider-images" class="slider-wrapper">
                    </div>
                
                <div class="slider-controls">
                    <button onclick="prevImage()">PREV</button>
                    <span id="image-counter">1 / 1</span>
                    <button onclick="nextImage()">NEXT</button>
                </div>
            </section>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
